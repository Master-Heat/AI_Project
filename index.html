<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess - Home</title>
  <!-- Chessboard.js CSS -->
  <link rel="stylesheet" href="css/chessboard-1.0.0.min.css">
  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Theme Switcher  -->

  <!-- ═══════════════════════════════════════════════════════════════
     THEME SWITCHER
     ═══════════════════════════════════════════════════════════════ -->
  <div class="theme-switcher-wrapper">

    <!-- Trigger Button -->
    <button class="button theme-trigger-btn" id="themeTriggerBtn">
      🎨 Board Theme
    </button>

    <!-- Palette Panel (hidden by default) -->
    <div class="theme-palette" id="themePalette">
      <div class="theme-palette-title">Choose a Board Theme</div>

      <div class="theme-swatches">

        <!-- Classic (default) -->
        <button class="theme-swatch" data-theme="classic" title="Classic">
          <span class="swatch-light" style="background:#ffffff;"></span>
          <span class="swatch-dark" style="background:#8B7355;"></span>
          <span class="swatch-label">Classic</span>
        </button>

        <!-- Slate -->
        <button class="theme-swatch" data-theme="slate" title="Slate">
          <span class="swatch-light" style="background:#d6dfe8;"></span>
          <span class="swatch-dark" style="background:#4a6fa5;"></span>
          <span class="swatch-label">Slate</span>
        </button>

        <!-- Forest -->
        <button class="theme-swatch" data-theme="forest" title="Forest">
          <span class="swatch-light" style="background:#edf2e9;"></span>
          <span class="swatch-dark" style="background:#4a7c59;"></span>
          <span class="swatch-label">Forest</span>
        </button>

        <!-- Coral -->
        <button class="theme-swatch" data-theme="coral" title="Coral">
          <span class="swatch-light" style="background:#fdf0ec;"></span>
          <span class="swatch-dark" style="background:#c0614a;"></span>
          <span class="swatch-label">Coral</span>
        </button>

        <!-- Midnight -->
        <button class="theme-swatch" data-theme="midnight" title="Midnight">
          <span class="swatch-light" style="background:#c8c9d4;"></span>
          <span class="swatch-dark" style="background:#2c2f4a;"></span>
          <span class="swatch-label">Midnight</span>
        </button>

        <!-- Sand -->
        <button class="theme-swatch" data-theme="sand" title="Sand">
          <span class="swatch-light" style="background:#f5e6c8;"></span>
          <span class="swatch-dark" style="background:#b58a3e;"></span>
          <span class="swatch-label">Sand</span>
        </button>

      </div>

      <!-- Test Elements -->
      <div class="theme-test-area">
        <span class="theme-test-label">Preview:</span>
        <div class="test-board-mini">
          <div class="test-sq test-sq-light"></div>
          <div class="test-sq test-sq-dark"></div>
          <div class="test-sq test-sq-dark"></div>
          <div class="test-sq test-sq-light"></div>
          <div class="test-sq test-sq-light"></div>
          <div class="test-sq test-sq-dark"></div>
          <div class="test-sq test-sq-dark"></div>
          <div class="test-sq test-sq-light"></div>
        </div>
      </div>
    </div>

  </div>
  <!-- ═══════════════════════════════════════════════════════════════
       SETUP PAGE (Initial View)
       ═══════════════════════════════════════════════════════════════ -->
  <div id="setupPage" class="page-view active">
    <div class="homepage">
      <div class="homepage buttons">
        <div class="button play-button expanded">

          <div class="play-button-text" onclick="openPlayConfig()">Play a Game</div>
          <div class="play-config" id="playConfig">
            <div class="play-config-title">Game Configuration:</div>
            <div class="play-config-items">
              <!-- Number of Players -->
              <div class="config-item small">
                <label class="config-title">Players:</label>
                <div class="config-input">
                  <button class="button config-button player-count" data-value="1">1 Player</button>
                  <button class="button config-button player-count" data-value="2">2 Players</button>
                </div>
              </div>
              <!-- Player Color(s) -->
              <div class="config-item">
                <label class="config-title" id="player1ColorLabel">Player Color:</label>
                <div class="config-input color-options">
                  <button class="button config-button color-button" data-value="black">Black</button>
                  <button class="button config-button color-button" data-value="white">White</button>
                  <button class="button config-button color-button" data-value="random">Random</button>
                </div>
              </div>
              <!-- Player 2 Color (only visible in 2player mode) -->
              <div class="config-item" id="player2ColorItem" style="display: none;">
                <label class="config-title">Player #2 Color:</label>
                <div class="config-input color-options">
                  <button class="button config-button color-button" data-value="black">Black</button>
                  <button class="button config-button color-button" data-value="white">White</button>
                  <button class="button config-button color-button" data-value="random">Random</button>
                </div>
              </div>
              <!-- Time Control -->
              <div class="config-item">
                <label class="config-title">Time Control</label>
                <div class="config-input">
                  <button class="button config-button time-button" data-value="1">1 Minute</button>
                  <button class="button config-button time-button" data-value="3">3 Minutes</button>
                  <button class="button config-button time-button" data-value="10">10 Minutes</button>
                </div>
              </div>
            </div>
            <button class="button play-start-button">Start Game</button>
          </div>
        </div>
      </div>
      <div class="homepage hero">
        <!-- <div id="hero-board"></div> -->
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       GAME PAGE (Hidden Initially)
       ═══════════════════════════════════════════════════════════════ -->
  <div id="gamePage" class="page-view">
    <div class="miangame">

      <div class="homepage game-active">
        <div class="homepage buttons game-started-buttons" id="gamePlayerCards">
          <!-- Player cards will be inserted here dynamically -->


        </div>
        <div class="homepage hero game-started-hero">
          <div id="chessboard"></div>
        </div>
      </div>
    </div>

    <!-- Game Result Overlay -->
    <div class="result">
      <div id="resultText">Game Over</div>
      <button id="backToSetupBtn" class="result-button">
        Back to Setup
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       SCRIPTS
       ═══════════════════════════════════════════════════════════════ -->

  <script src="javascript/SVGhandler.js"></script>
  <!-- Hero board animation -->
  <script src="javascript/hero.js"></script>

  <!-- Setup page logic -->
  <script src="javascript/setup.js"></script>

  <!-- jQuery (required by chessboard.js) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Chessboard.js -->
  <script src="js/chessboard-1.0.0.min.js"></script>

  <!-- Chess.js (move validation and game state) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

  <!-- Hegazi's handcrafted pieces -->
  <script src="javascript/pieces.js"></script>

  <!-- Game Logic -->
  <script src="javascript/script.js"></script>

  <!-- Opening Book -->
  <script src="javascript/openingBook.js"></script>
  <!-- the themes logic -->
  <script src="javascript/themes.js"></script>

</body>

</html>
