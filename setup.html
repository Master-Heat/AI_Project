<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .setup-container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
            font-size: 28px;
        }

        .config-section {
            margin-bottom: 40px;
        }

        .config-label {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: block;
        }

        .options-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .option {
            flex: 1;
            min-width: 100px;
        }

        .option input[type="radio"],
        .option input[type="checkbox"] {
            display: none;
        }

        .option label {
            display: block;
            padding: 15px 20px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .option input[type="radio"]:checked + label,
        .option input[type="checkbox"]:checked + label {
            background-color: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option label:hover {
            border-color: #667eea;
            background-color: #f5f5f5;
        }

        .play-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .play-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .play-button:active {
            transform: translateY(0);
        }

        .info-text {
            font-size: 13px;
            color: #888;
            margin-top: 8px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <h1>♟ Chess Game Setup ♟</h1>

        <div class="config-section">
            <label class="config-label">Time Control</label>
            <div class="options-group">
                <div class="option">
                    <input type="radio" id="time1" name="timeControl" value="60" checked>
                    <label for="time1">1 min</label>
                </div>
                <div class="option">
                    <input type="radio" id="time3" name="timeControl" value="180">
                    <label for="time3">3 min</label>
                </div>
                <div class="option">
                    <input type="radio" id="time10" name="timeControl" value="600">
                    <label for="time10">10 min</label>
                </div>
            </div>
            <div class="info-text">Choose time per player</div>
        </div>

        <div class="config-section">
            <label class="config-label">AI Color (Player 1)</label>
            <div class="options-group">
                <div class="option">
                    <input type="radio" id="aiBlack" name="aiColor" value="black" checked>
                    <label for="aiBlack">Black</label>
                </div>
                <div class="option">
                    <input type="radio" id="aiWhite" name="aiColor" value="white">
                    <label for="aiWhite">White</label>
                </div>
                <div class="option">
                    <input type="radio" id="aiRandom" name="aiColor" value="random">
                    <label for="aiRandom">Random</label>
                </div>
            </div>
            <div class="info-text">Choose AI color (Human gets the other)</div>
        </div>

        <button class="play-button" onclick="startGame()">▶ PLAY</button>
    </div>

    <script>
        function startGame() {
            // Get selected values
            const timeControl = document.querySelector('input[name="timeControl"]:checked').value;
            const aiColor = document.querySelector('input[name="aiColor"]:checked').value;

            // Determine actual colors
            let finalAiColor, finalHumanColor;
            if (aiColor === 'random') {
                // Random: 50% chance for each
                finalAiColor = Math.random() < 0.5 ? 'black' : 'white';
                finalHumanColor = finalAiColor === 'black' ? 'white' : 'black';
            } else {
                finalAiColor = aiColor;
                finalHumanColor = aiColor === 'black' ? 'white' : 'black';
            }

            // Store configuration in localStorage
            const config = {
                timeControl: parseInt(timeControl),
                aiColor: finalAiColor,
                humanColor: finalHumanColor
            };

            localStorage.setItem('chessGameConfig', JSON.stringify(config));

            // Redirect to game page
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
