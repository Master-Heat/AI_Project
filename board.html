<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Board</title>

  <!-- Chessboard.js CSS -->
  <link rel="stylesheet" href="css/chessboard-1.0.0.min.css">

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="game-container">

    <div id="playerTop" class="player-info">
      <div class="player-name">AI</div>
      <div class="player-details">
        <span class="player-color">♞</span>
        <span class="player-time">3:00</span>
      </div>
    </div>

    <div id="chessboard"></div>

    <div id="playerBottom" class="player-info">
      <div class="player-name">You</div>
      <div class="player-details">
        <span class="player-color">♙</span>
        <span class="player-time">3:00</span>
      </div>
    </div>

  </div>

  <div class="result">
    <div id="resultText">Game Over</div>
    <button onclick="window.location.href='index.html'" style="margin-top:20px;padding:10px 20px;background:white;
             color:#333;border:none;border-radius:5px;
             cursor:pointer;font-weight:bold;">
      Back to Setup
    </button>
  </div>

  <!-- ── 1. jQuery (required by chessboard.js) ───────────── -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- ── 2. Chessboard.js ────────────────────────────────── -->
  <script src="js/chessboard-1.0.0.min.js"></script>

  <!-- ── 3. Chess.js (move validation and game state) ─────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

  <!-- ── 4. Game Logic (defines `game` and `gameConfig`) ──── -->
  <script src="javascript/script.js"></script>

  <!-- ── 5. Opening Book (needs `game` and `gameConfig`) ──── -->
  <script src="javascript/openingBook.js"></script>

  <!-- ── 6. AI Agent (needs everything above) ─────────────── -->
  <script src="javascript/agent.js"></script>
  <script src="javascript/openingBookV3.js"></script>


</body>

</html>
