<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chessboard</title>
    <!-- Link to chessboard.js CSS -->
    <link rel="stylesheet" href="css/chessboard-1.0.0.min.css">
    <!-- Include jQuery (dependency for chessboard.js) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Include chessboard.js -->
    <script src="js/chessboard-1.0.0.min.js"></script>
    <!-- Include chess.js for legal move validation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div id="playerTop" class="player-info">
            <div class="player-name">AI</div>
            <div class="player-details">
                <span class="player-color">♞</span>
                <span class="player-time">3:00</span>
            </div>
        </div>
        <div id="chessboard"></div>
        <div id="playerBottom" class="player-info">
            <div class="player-name">Human</div>
            <div class="player-details">
                <span class="player-color">♙</span>
                <span class="player-time">3:00</span>
            </div>
        </div>
    </div>
    <div class="result">
        <div id="resultText">the game is over</div>
        <button onclick="window.location.href='index.html'" style="margin-top: 20px; padding: 10px 20px; background: white; color: #333; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Back to Setup</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
